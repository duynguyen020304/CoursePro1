# Docker Compose for Laravel + React + Vite Development Environment

services:
  mysql:
    image: mysql:8.0
    container_name: coursepro_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ecourse
      MYSQL_USER: coursepro_user
      MYSQL_PASSWORD: coursepro_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/Model/Database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    networks:
      - coursepro_network

  laravel:
    build:
      context: ./coursepro-laravel
      dockerfile: Dockerfile
    container_name: coursepro_laravel
    restart: unless-stopped
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=ecourse
      - DB_USERNAME=coursepro_user
      - DB_PASSWORD=coursepro_pass
      - APP_ENV=local
      - APP_DEBUG=true
    ports:
      - "8000:8000"
    volumes:
      - ./coursepro-laravel:/var/www/html
    depends_on:
      - mysql
    networks:
      - coursepro_network

  vite:
    image: node:20-alpine
    container_name: coursepro_vite
    restart: unless-stopped
    working_dir: /var/www/html
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./coursepro-laravel:/var/www/html
    depends_on:
      - laravel
    networks:
      - coursepro_network

  # Python AI Recommendation Service
  python-ai:
    build:
      context: ./backend/api/python
      dockerfile: Dockerfile
    container_name: coursepro_python_ai
    restart: unless-stopped
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=ecourse
      - DB_USER=coursepro_user
      - DB_PASSWORD=coursepro_pass
    ports:
      - "5000:5000"
    volumes:
      - ./backend/api/python:/app
    depends_on:
      - mysql
    networks:
      - coursepro_network

volumes:
  mysql_data:

networks:
  coursepro_network:
    driver: bridge